services:
  rmcs-develop:
    image: qzhhhi/rmcs-develop:latest
    user: "1000:1000"
    privileged: true
    volumes:
      - /dev:/dev:bind
      - /tmp/.X11-unix:/tmp/.X11-unix:bind
      - /run/user/1000/wayland-0:/run/user/1000/wayland-0:bind
      - ${HOME}/.config/:${CONTAINER_HOME}/.config/:bind
      - .:/workspaces/RMCS:bind
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - MVCAM_COMMON_RUNENV=/workspaces/RMCS/rmcs_ws/install/lib
    network_mode: host
    tty: true
    stdin_open: true
