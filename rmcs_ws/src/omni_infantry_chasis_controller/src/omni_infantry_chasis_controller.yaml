omni_infantry_chasis_controller:
  joints:
    {
      type: string_array,
      default_value: [],
      description: "Specifies joints used by the controller. If state joints parameter is defined, then only command joints are defined with this parameter.",
      read_only: true,
      validation: { unique<>: null, not_empty<>: null },
    }
  state_interface_name:
    {
      type: string_array,
      default_value: [],
      description: "Name of the interface used by the controller on joints and command_joints.",
      validation:
        {
          unique<>: null,
          subset_of<>: [["position", "velocity", "acceleration", "effort"]],
        },
    }
  cmd_interface_name:
    {
      type: string_array,
      default_value: [],
      description: "Name of the interface used by the controller on joints and command_joints.",
      validation:
        {
          unique<>: null,
          subset_of<>: [["position", "velocity", "acceleration", "effort"]],
        },
    }
  front_left_wheel:
    pid_data:
      P: { type: double, default_value: 0.0 }
      I: { type: double, default_value: 0.0 }
      D: { type: double, default_value: 0.0 }

  front_right_wheel:
    pid_data:
      P: { type: double, default_value: 0.0 }
      I: { type: double, default_value: 0.0 }
      D: { type: double, default_value: 0.0 }

  back_left_wheel:
    pid_data:
      P: { type: double, default_value: 0.0 }
      I: { type: double, default_value: 0.0 }
      D: { type: double, default_value: 0.0 }

  back_right_wheel:
    pid_data:
      P: { type: double, default_value: 0.0 }
      I: { type: double, default_value: 0.0 }
      D: { type: double, default_value: 0.0 }
