joint_sweep_recorder:
  ros__parameters:
    joint_name: left_front
    output_directory: /tmp/joint-id/left_front
    csv_decimation: 2
    target_angle: /chassis/joint_sweep/target_angle
    excitation_offset: /chassis/joint_sweep/excitation_offset
    excitation_velocity: /chassis/joint_sweep/excitation_velocity
    frequency_hz: /chassis/joint_sweep/frequency_hz
    phase_rad: /chassis/joint_sweep/phase_rad
    working_point_angle_deg: /chassis/joint_sweep/working_point_angle_deg
    segment_index: /chassis/joint_sweep/segment_index
    measurement_angle: /chassis/left_front_joint/physical_angle
    measurement_velocity: /chassis/left_front_joint/physical_velocity
    measured_torque: /chassis/left_front_joint/torque
    control_torque: /chassis/left_front_joint/control_torque
    eso_z3: /chassis/left_front_joint/eso_z3
    eso_z2: /chassis/left_front_joint/eso_z2
