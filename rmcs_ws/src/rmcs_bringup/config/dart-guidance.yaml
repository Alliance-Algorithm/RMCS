rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::CatapultDart        -> dart_hardware
      - rmcs_dart_guidance::manager::DartManager   -> dart_manager
      - rmcs_dart_guidance::manager::RemoteCommandBridge -> remote_cmd_bridge

      - rmcs_core::referee::Status -> referee_status
      - rmcs_core::referee::Command -> referee_command

      - rmcs_dart_guidance::DartVisionCore -> dart_vision_core
      # - rmcs_dart_guidance::ImagePublisher -> dart_display_image_publisher
      # - rmcs_dart_guidance::ImagePublisher -> host_bridge

      - rmcs_core::controller::dart::DartTriggerController -> trigger_setting
      - rmcs_core::controller::dart::DartBeltController -> dart_belt_controller
      - rmcs_core::controller::dart::DartFilling -> dart_filling
      - rmcs_core::controller::dart::DartSettingController -> dart_setting
      - rmcs_core::controller::pid::PidController    -> yaw_velocity_pid_controller
      - rmcs_core::controller::pid::PidController    -> pitch_velocity_pid_controller
      - rmcs_core::controller::pid::PidController    -> force_screw_velocity_pid_controller
      - rmcs_core::broadcaster::ValueBroadcaster -> broadcaster


broadcaster:
  ros__parameters:
    forward_list:
      - /dart/drive_belt/left/control_torque
      - /dart/drive_belt/right/control_torque
      - /dart/force_screw_motor/velocity
      - /dart/force_screw_motor/torque

remote_cmd_bridge:
  ros__parameters:
    vision_enable: true

dart_hardware:
  ros__parameters:
    serial_filter: ""

dart_manager:
  ros__parameters:
    fire_target: "basement"  # frontier or basement
    basement_travel_angle: 3000000.0
    frontier_travel_angle: 2334720.0
    belt_down_velocity: 10.0
    belt_down_travel_angle: 10.0
    belt_up_velocity: 20.0
    belt_up_travel_angle: 10.0
    belt_interference_relief_travel_angle: 17.0
    belt_init_velocity: 3.0
    carriage_down_velocity: 20.0
    carriage_up_velocity: 20.0
    carriage_lift_down_limit: -7500000.0
    carriage_adjust_down_angle: 778240.0
    carriage_adjust_up_angle: 778240.0
    manual_max_velocity: 10.0
    lift_velocity: 3.0
    force_manual_scale: 1000.0
    angle_manual_scale: 50.0
    limiting_fill_ticks: 150
    belt_stall_velocity_threshold: 1.0
    belt_stall_torque_threshold: 0.5
    belt_stall_confirm_ticks: 100
    belt_init_stall_velocity_threshold: 1.0
    belt_init_stall_torque_threshold: 0.5
    belt_init_stall_confirm_ticks: 100
    belt_init_max_torque: 1.5
    lifting_velocity_stall_threshold: 0.1  # rad/s，低于此值视为堵转
    lifting_stall_torque_threshold: 0.1
    lifting_stall_confirm_ticks: 150  # 连续帧数 = 0.1s @ 1kHz
    lifting_stall_min_run_ticks: 300  # 启动后最少运行帧数，避免启动瞬间误触发
    carriage_stall_velocity_threshold: 0.2
    carriage_stall_torque_threshold: 0.2
    carriage_stall_confirm_ticks: 100
    carriage_calibration_velocity: 2.0
    carriage_calibration_stall_velocity_threshold: 1.0
    carriage_calibration_stall_torque_threshold: 0.15
    carriage_calibration_stall_confirm_ticks: 200
    carriage_calibration_max_torque: 0.20
    carriage_calibration_parking_angle: 5000000.0 #6000000.0
    carriage_angle_allowable_error: 50.0
    carriage_min_run_ticks: 500
    carriage_timeout_ticks: 600000
    vision_aim.allowable_error.x: 3
    vision_aim.allowable_error.y: 20
    vision_aim.timeout_ticks: 20000
    carriage_startup_position_angle: -6099997.0

    vision_aim.shot_profiles.0.reference_point.x: 530
    vision_aim.shot_profiles.0.reference_point.y: 720
    vision_aim.shot_profiles.0.offset.x: 0
    vision_aim.shot_profiles.0.offset.y: 0
    vision_aim.shot_profiles.0.pitch_angle: 32.0
    vision_aim.shot_profiles.0.trigger_carriage_position: -6000000 # -5950000

    vision_aim.shot_profiles.1.reference_point.x: 530
    vision_aim.shot_profiles.1.reference_point.y: 720
    vision_aim.shot_profiles.1.offset.x: 0
    vision_aim.shot_profiles.1.offset.y: 0
    vision_aim.shot_profiles.1.pitch_angle: 32.0
    vision_aim.shot_profiles.1.trigger_carriage_position: -5900000

    vision_aim.shot_profiles.2.reference_point.x: 520
    vision_aim.shot_profiles.2.reference_point.y: 720
    vision_aim.shot_profiles.2.offset.x: 0
    vision_aim.shot_profiles.2.offset.y: 0
    vision_aim.shot_profiles.2.pitch_angle: 32.0
    vision_aim.shot_profiles.2.trigger_carriage_position: -6100000

    vision_aim.shot_profiles.3.reference_point.x: 520
    vision_aim.shot_profiles.3.reference_point.y: 190
    vision_aim.shot_profiles.3.offset.x: 0
    vision_aim.shot_profiles.3.offset.y: 0
    vision_aim.shot_profiles.3.pitch_angle: 32.0
    vision_aim.shot_profiles.3.trigger_carriage_position: -6100000

dart_vision_core:
  ros__parameters:
    invert_image: true
    exposure_time: 2000
    gain: 0.0
    L_H: 45.0
    L_S: 0.0
    L_V: 200.0
    U_H: 90.0
    U_S: 255.0
    U_V: 255.0

host_bridge:
  ros__parameters:
    Interface_name: /dart_guidance/camera/camera_image
    topic_name: /dart_guidance/camera/camera_image
    publish_freq: 60.0
    image_type: bgr8

dart_display_image_publisher:
  ros__parameters:
    Interface_name: /dart_guidance/camera/display_image
    topic_name: /dart_guidance/camera/display_image
    publish_freq: 60.0
    image_type: mono8

trigger_setting:
  ros__parameters:
    trigger_free_value: 0.625
    trigger_lock_value: 0.45

dart_belt_controller:
  ros__parameters:
    b_kp: 1.0
    b_ki: 0.0
    b_kd: 0.0
    belt_velocity: 10.0
    belt_acceleration: 20.0  # 上游目标速度变化时的对称梯形加/减速度限制
    sync_coefficient: 0.1
    max_control_torque: 20.0
    belt_hold_torque: 3.0

dart_filling:
  ros__parameters:
    lifting_velocity: 3.0
    limiting_free_angle: 0x0CFF
    limiting_lock_angle: 0x0B53

dart_setting:
  ros__parameters:
    yaw_error_to_velocity_gain: -1.0
    pitch_error_to_velocity_gain: 10.0
    force_error_kp: 0.2
    force_error_ki: 0.0
    force_error_kd: 0.0
    force_error_integral_min: -10.0
    force_error_integral_max: 10.0
    force_error_integral_split_min: -20.0
    force_error_integral_split_max: 20.0
    carriage_angle_kp: 0.005
    carriage_angle_ki: 0.000025
    carriage_angle_kd: 0.0
    carriage_angle_integral_min: -2.0
    carriage_angle_integral_max: 2.0
    carriage_angle_integral_split_min: -20.0
    carriage_angle_integral_split_max: 20.0
    carriage_angle_output_min: -500.0
    carriage_angle_output_max: 500.0
    yaw_max_velocity: 10.0
    pitch_max_velocity: 10.0
    force_max_velocity: 1000.0

yaw_velocity_pid_controller:
  ros__parameters:
    measurement: /dart/yaw_motor/velocity
    setpoint:    /dart/yaw_motor/control_velocity
    control:     /dart/yaw_motor/control_torque
    kp: 0.3
    ki: 0.0
    kd: 0.0

pitch_velocity_pid_controller:
  ros__parameters:
    measurement: /dart/pitch_motor/velocity
    setpoint:    /dart/pitch_motor/control_velocity
    control:     /dart/pitch_motor/control_torque
    kp: 0.6
    ki: 0.0
    kd: 0.0

force_screw_velocity_pid_controller:
  ros__parameters:
    measurement: /dart/force_screw_motor/velocity
    setpoint:    /dart/force_screw_motor/control_velocity
    control:     /dart/force_screw_motor/control_torque
    output_min_override: -/dart_manager/force/max_torque_override
    output_max_override: /dart_manager/force/max_torque_override
    kp: 0.3
    ki: 0.0
    kd: 0.0