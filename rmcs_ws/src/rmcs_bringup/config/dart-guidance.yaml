rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
    - rmcs_dart_guidance::DartVisionCore -> dart_vision_core
    - rmcs_dart_guidance::DebugDisplayComponent -> debug_display
    - rmcs_dart_guidance::ImagePublisher -> image_publisher
    - rmcs_dart_guidance::ImagePublisher -> camera_parameter_image_publisher
    - rmcs_dart_guidance::CameraCalibrationComponent -> dart_vision_calibration

dart_vision_core:
  ros__parameters:
    invert_image: false
    exposure_time: 5000
    gain: 11.0
    L_H: 0.0
    L_S: 0.0
    L_V: 200.0
    U_H: 180.0
    U_S: 30.0
    U_V: 255.0
    enable_image_saving: false
    image_save_directory: "./saved_images"
    image_save_interval_ms: 1000
    save_raw_image: true
    save_processed_image: false

debug_display:
  ros__parameters:
    raw_image_topic: "/dart_guidance/raw_image"
    processed_image_topic: "/dart_guidance/processed_image"
    target_topic: "/dart_guidance/target_position"
    display_raw: false
    display_processed: true
    max_fps: 30
    window_scale: 1.0
    save_on_error: false
    save_directory: "./debug_saved"

image_publisher:
  ros__parameters:
    Interface_name: "/dart_guidance/camera/display_image"
    topic_name: "/dart_guidance/processed_image"
    publish_freq: 15.0
    image_type: "mono8"

camera_parameter_image_publisher:
  ros__parameters:
    Interface_name: "/dart_guidance/camera/camera_image"   
    topic_name: "/dart_guidance/camera/camera_image"       
    publish_freq: 30.0                                     
    image_type: "bgr8"

dart_vision_calibration:
  ros__parameters:
    image_topic: "/dart_guidance/camera/camera_image"
    board_width:  7        
    board_height: 7        
    square_size: 0.006     
    save_path: "./calibration_results"
    enabled: true  