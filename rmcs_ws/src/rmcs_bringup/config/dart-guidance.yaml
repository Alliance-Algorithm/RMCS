rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::CatapultDartV4 -> dart_hardware
      - rmcs_dart_guidance::manager::DartManager -> dart_manager
      - rmcs_dart_guidance::manager::RemoteCommandBridge -> remote_cmd_bridge
      # - rmcs_dart_guidance::manager::WebCommandBridge -> web_cmd_bridge
      - rmcs_core::controller::dart::DartLaunchSetting -> launch_setting
      - rmcs_core::controller::dart::DartSettingController -> dart_setting
      - rmcs_core::controller::pid::PidController -> force_screw_velocity_pid_controller

dart_hardware:
  ros__parameters:
    serial_filter: ""
    first_sample_spot: 1.0
    final_sample_spot: 4.0

dart_manager:
  ros__parameters:
    max_transform_rate: 15.0
    manual_force_scale: 15.0

remote_cmd_bridge:
  ros__parameters:
    joystick_sensitivity: 0.01

launch_setting:
  ros__parameters:
    belt_velocity: 15.0
    sync_coefficient: 0.1
    max_control_torque: 15.0
    trigger_free_value: 0.75
    trigger_lock_value: 0.63
    b_kp: 1.0
    b_ki: 0.0
    b_kd: 0.0

dart_setting:
  ros__parameters:
    yaw_kp: 1.0
    yaw_ki: 0.0
    yaw_kd: 0.0
    pitch_kp: 1.0
    pitch_ki: 0.0
    pitch_kd: 0.0

force_screw_velocity_pid_controller:
  ros__parameters:
    measurement: /dart/force_screw/velocity
    setpoint:    /force/control/velocity
    control:     /dart/force_screw/control_torque
    kp: 1.0
    ki: 0.0
    kd: 0.0
