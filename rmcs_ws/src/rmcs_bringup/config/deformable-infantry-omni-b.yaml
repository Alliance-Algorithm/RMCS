    dt: 0.001
    b0: -1.0
    kt: 1.0
    td_h: 0.001
    td_r: 50.0
    eso_w0: 250.0
    eso_auto_beta: true
    k1: 30.0
    k2: 17.0
    alpha1: 0.75
    alpha2: 0.7
    delta: 0.02
    u_min: -200.0
    u_max: 200.0
    output_min: -200.0
    output_max: 200.0

