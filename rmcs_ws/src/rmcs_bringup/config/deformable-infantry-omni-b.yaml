    control: /gimbal/bullet_feeder/control_torque
    kp: 1.5
    ki: 0.0
    kd: 0.0

deformable_chassis_controller:
  ros__parameters:
    mass: 25.5
    moment_of_inertia: 1.0
    chassis_radius: 0.26848
    rod_length: 0.140
    wheel_radius: 0.075
    friction_coefficient: 6.6
    k1: 2.958580e+00
    k2: 3.082190e-03
    no_load_power: 11.37

