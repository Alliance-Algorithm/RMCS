rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      # - rmcs_core::controller::dart::DartCamera -> dart_camera
      # - rmcs_core::controller::dart::DartAiming -> dart_aiming
      - rmcs_core::controller::dart::MessagePublisher -> message_publisher

message_publisher:
  ros__parameters:
    camera_enable: true
    friction_enable: false

dart_camera:
  ros__parameters:
    image_show_enable: true
    invert_image: true
    exposure_time: 1000

dart_aiming:
  ros__parameters:
    image_show_enable: false
    lowerlimit_H: 60.00
    lowerlimit_L: 128.00
    lowerlimit_S: 60.00
    upperlimit_H: 80.00
    upperlimit_L: 160.00
    upperlimit_S: 255.00
    yaw_aim_position: 720.00
    pitch_aim_position: 120.00
