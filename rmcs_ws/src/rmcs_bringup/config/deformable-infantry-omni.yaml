rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::DeformableInfantryOmni -> deformable_infantry

      - rmcs_core::referee::Status -> referee_status

      - rmcs_core::controller::gimbal::DeformableInfantryGimbalController -> gimbal_controller

      - rmcs_core::controller::shooting::FrictionWheelController -> friction_wheel_controller
      - rmcs_core::controller::shooting::HeatController -> heat_controller
      - rmcs_core::controller::shooting::BulletFeederController17mm -> bullet_feeder_controller
      - rmcs_core::controller::pid::PidController -> left_friction_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> right_friction_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> bullet_feeder_velocity_pid_controller

      - rmcs_core::controller::chassis::DeformableChassis -> chassis_test_controller
      - rmcs_core::controller::adrc::AdrcController -> lf_joint_adrc_controller
      - rmcs_core::controller::adrc::AdrcController -> lb_joint_adrc_controller
      - rmcs_core::controller::adrc::AdrcController -> rb_joint_adrc_controller
      - rmcs_core::controller::adrc::AdrcController -> rf_joint_adrc_controller
      - rmcs_core::controller::chassis::ChassisPowerController -> chassis_power_controller
      - rmcs_core::controller::chassis::OmniWheelController -> deformable_omni_wheel_controller

      - rmcs_core::broadcaster::ValueBroadcaster -> value_broadcaster

value_broadcaster:
  ros__parameters:
    forward_list:
      - /chassis/left_front_joint/control_torque
      - /chassis/left_back_joint/control_torque
      - /chassis/right_front_joint/control_torque
      - /chassis/right_back_joint/control_torque
      - /chassis/encoder/alpha
      - /chassis/encoder/alpha_dot
      - /chassis/radius
      - /chassis/control_power_limit

deformable_infantry:
  ros__parameters:
    serial_filter_rmcs_board: "AF-3CE0-2D2A-6CDC-89D0-CA40-90D7-46B5-4970"
    serial_filter_top_board: "D4-0262-9E84-E715-CADB-9894-7241"
    yaw_motor_zero_point: 56216
    pitch_motor_zero_point: 10898

gimbal_controller:
  ros__parameters:
    upper_limit: -0.5098
    lower_limit: 0.2262

    yaw_angle_kp: 8.0
    yaw_angle_ki: 0.0
    yaw_angle_kd: 0.01

    yaw_velocity_kp: 5.4
    yaw_velocity_ki: 0.0
    yaw_velocity_kd: 0.01

    yaw_acc_ff_gain: 0.1

    pitch_angle_kp: 12.0
    pitch_angle_ki: 0.0
    pitch_angle_kd: 0.1

    pitch_velocity_kp: 4.0
    pitch_velocity_ki: 0.0
    pitch_velocity_kd: 0.0

    pitch_acc_ff_gain: 0.1

friction_wheel_controller:
  ros__parameters:
    friction_wheels:
      - /gimbal/left_friction
      - /gimbal/right_friction
    friction_velocities:
      - 700.0
      - 700.0
    friction_soft_start_stop_time: 1.0

heat_controller:
  ros__parameters:
    heat_per_shot: 10000
    reserved_heat: 10000

bullet_feeder_controller:
  ros__parameters:
    bullets_per_feeder_turn: 8.0
    shot_frequency: 10.0
    safe_shot_frequency: 10.0
    eject_frequency: 10.0
    eject_time: 0.05
    deep_eject_frequency: 5.0
    deep_eject_time: 0.20
    single_shot_max_stop_delay: 2.0

left_friction_velocity_pid_controller:
  ros__parameters:
    measurement: /gimbal/left_friction/velocity
    setpoint: /gimbal/left_friction/control_velocity
    control: /gimbal/left_friction/control_torque
    kp: 0.003436926
    ki: 0.0
    kd: 0.009373434

right_friction_velocity_pid_controller:
  ros__parameters:
    measurement: /gimbal/right_friction/velocity
    setpoint: /gimbal/right_friction/control_velocity
    control: /gimbal/right_friction/control_torque
    kp: 0.003436926
    ki: 0.0
    kd: 0.009373434

bullet_feeder_velocity_pid_controller:
  ros__parameters:
    measurement: /gimbal/bullet_feeder/velocity
    setpoint: /gimbal/bullet_feeder/control_velocity
    control: /gimbal/bullet_feeder/control_torque
    kp: 1.583
    ki: 0.0
    kd: 0.0

# NOTE: Omni chassis-only variant still follows V2 joint control chain.
# Joint motor: MG5010 i36, zero at 62.5deg, range 62.5deg -> 8deg (360deg system)
chassis_test_controller:
  ros__parameters:
    min_angle: 5.0
    max_angle: 55.0

lf_joint_adrc_controller:
  ros__parameters:
    measurement: /chassis/left_front_joint/angle
    setpoint: /chassis/left_front_joint/target_angle
    control: /chassis/left_front_joint/control_torque
    kt: 1.0
    td_h: 0.001
    td_r: 50.0
    dt: 0.001
    b0: 0.550
    eso_w0: 250.0
    eso_auto_beta: true
    k1: 30.0
    k2: 17.0
    alpha1: 0.75
    alpha2: 0.7
    delta: 0.02
    u_min: -200.0
    u_max: 200.0

