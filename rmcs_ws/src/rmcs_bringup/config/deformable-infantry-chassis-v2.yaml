lf_joint_adrc_controller:
  ros__parameters:
    measurement: /chassis/left_front_joint/angle
    setpoint: /chassis/left_front_joint/target_angle
    control: /chassis/left_front_joint/control_torque
    kt: 1.0

    td_h: 0.001
    td_r: 1.4

    dt: 0.001
    b0: 0.694
    eso_w0: 250.0
    eso_auto_beta: true

    k1: 30.0
    k2: 17.0
    alpha1: 0.75
    alpha2: 0.7
    delta: 0.02
    u_min: -25.0
    u_max: 25.0

