value_broadcaster:
  ros__parameters:
    forward_list:
      - /chassis/left_front_joint/control_torque
      - /chassis/left_back_joint/control_torque
      - /chassis/right_back_joint/control_torque
      - /chassis/right_front_joint/control_torque
deformable_infantry_chassis_v2:
  ros__parameters:
    serial_filter_rmcs_board: "AF-3CE0-2D2A-6CDC-89D0-CA40-90D7-46B5-4970"
    enable_top_board: false
    serial_filter_top_board: "TBD" # only used when enable_top_board=true
    left_front_zero_point: 0
    left_back_zero_point: 0
    right_back_zero_point: 0
    right_front_zero_point: 0
    yaw_motor_zero_point: 0
    pitch_motor_zero_point: 0

# NOTE: V2 uses LK motor built-in encoder zero point for joints.
# joint_offset parameters removed — no longer needed.
# chassis_controller:
#   ros__parameters:
#     min_angle: 12.5
#     max_angle: 42.0
#     Rod_relative_horizontal_coordinate: 5.0
#     Rod_relative_longitudinal_coordinate: 75.0
#     Rod_length: 80.0

chassis_controller_v2:
  ros__parameters:
    # fixed / function
    control_mode: fixed

    # all angle parameters are in degrees
    # fixed mode
    target_angle_deg: 30.0

    # function mode (default sine)
    function_type: sine
    function_offset_deg: 30.0
    function_amplitude_deg: 5.0
    function_frequency_hz: 0.5
    function_phase_deg: 0.0

    print_debug: false

