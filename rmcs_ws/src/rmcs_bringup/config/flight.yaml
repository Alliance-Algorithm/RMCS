rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::Flight -> flight_hardware
      - rmcs_core::referee::Status -> referee_status

      # - rmcs_core::controller::gimbal::HoldController -> hold_controller

      # ====== Auto-aim backend (choose one) ======
      # Option A: sp_vision_25 → SpVisionPlanner
      # - sp_vision_25::bridge::SpVisionBridge -> sp_vision_bridge
      # - rmcs_core::controller::gimbal::SpVisionPlanner -> sp_vision_planner
      # Option B: rmcs_auto_aim_v2
      - rmcs::AutoAimComponent -> auto_aim_v2

      - rmcs_core::controller::gimbal::FlightGimbalController -> gimbal_controller
      - rmcs_core::controller::pid::ErrorPidController -> yaw_angle_pid_controller
      - rmcs_core::controller::pid::ErrorPidController -> pitch_angle_pid_controller

      - rmcs_core::controller::shooting::FrictionWheelController -> friction_wheel_controller
      - rmcs_core::controller::shooting::HeatController -> heat_controller
      - rmcs_core::controller::shooting::BulletFeederController17mm -> bullet_feeder_controller
      - rmcs_core::controller::pid::PidController -> left_friction_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> right_friction_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> bullet_feeder_velocity_pid_controller

      - rmcs_core::controller::gimbal::AutoAimResponseRecorder -> aim_recorder

      - rmcs_core::referee::command::Interaction -> referee_interaction
      - rmcs_core::referee::Command -> referee_command

      - rmcs_core::broadcaster::ValueBroadcaster -> value_broadcaster
      - rmcs_core::broadcaster::TfBroadcaster -> tf_broadcaster

value_broadcaster:
  ros__parameters:
    forward_list:
      - /gimbal/pitch/angle
      - /gimbal/pitch/velocity
      - /gimbal/pitch/torque
      - /gimbal/pitch/control_angle_error
      - /gimbal/pitch/control_velocity
      - /gimbal/pitch/velocity_imu

      - /gimbal/yaw/angle
      - /gimbal/yaw/velocity
      - /gimbal/yaw/torque
      - /gimbal/yaw/control_torque
      - /gimbal/yaw/control_angle_error
      - /gimbal/yaw/velocity_imu
      - /gimbal/yaw/gyro_raw
      - /gimbal/pitch/gyro_raw


tf_broadcaster:
  ros__parameters:
    tf: /tf

flight_hardware:
  ros__parameters:
    board_serial: "d4-9d44"
    yaw_motor_zero_point: 55555
    pitch_motor_zero_point: 18578

sp_vision_bridge:
  ros__parameters:
    config_file: configs/flight.yaml
    debug: true

aim_recorder:
  ros__parameters:
    output_csv_path: /tmp/flight_auto_aim.csv
    csv_decimation: 10

referee_status:
  ros__parameters:
    path: /dev/tty0

hold_controller:
  ros__parameters:
    # Joystick is Eigen::Vector2d normalized to [-1,1]. 0.03 is ~3% deflection.
    joystick_deadband: 0.03
    # Mouse velocity is in per-tick counts; 0.5 is a conservative quiet threshold.
    mouse_deadband: 0.5
    # Hold mode IMU damping gain (Nm·s/rad for yaw, (rad/s)·s/rad for pitch).
    # P comes from the angle PID on encoder error; D comes from here via IMU velocity.
    # Higher → stiffer disturbance rejection. IMU is smooth so these can be large.
    hold_yaw_kd: 0.001
    hold_pitch_kd: 0.05

gimbal_controller:
  ros__parameters:
    upper_limit: -1.00
    lower_limit: 0.60
    yaw_upper_limit: -0.349
    yaw_lower_limit: 0.349
    # SetToLevel must converge below this |yaw_err|/|pitch_err| (rad) before
    # hold mode is permitted. ~0.02 rad ≈ 1.1°.
    hold_level_threshold: 0.02

sp_vision_planner:
  ros__parameters:
    # Consumed when Option A (sp_vision_25 → SpVisionPlanner) is enabled.
    # Publishes the unified /gimbal/auto_aim/* interface that gimbal_controller
    # consumes; rmcs_auto_aim_v2 publishes the same topics under Option B.
    bullet_speed_fallback: 23.0
    result_timeout: 0.2
    yaw_offset: 0.0
    pitch_offset: 0.0
    fire_thresh: 0.0035
    low_speed_delay_time: 0.0
    high_speed_delay_time: 0.0
    decision_speed: 7.0
    max_yaw_acc: 500.0
    max_pitch_acc: 100.0
    # Feedforward gains (scaled velocities/accelerations are published as
    # /gimbal/auto_aim/yaw_feedforward and /gimbal/auto_aim/pitch_feedforward).
    yaw_vel_ff_gain: 0.0
    yaw_acc_ff_gain: 0.0
    pitch_vel_ff_gain: 1.0

yaw_angle_pid_controller:
  ros__parameters:
    measurement: /gimbal/yaw/control_angle_error
    feedforward: /gimbal/yaw/feedforward
    control: /gimbal/yaw/control_torque
    kp: 70.8943
    ki: 0.0
    kd: 1440.0

pitch_angle_pid_controller:
  ros__parameters:
    measurement: /gimbal/pitch/control_angle_error
    feedforward: /gimbal/pitch/feedforward
    control: /gimbal/pitch/control_velocity
    kp: 10.0
    ki: 0.0
    kd: 400.0

friction_wheel_controller:
  ros__parameters:
    friction_wheels:
      - /gimbal/left_friction
      - /gimbal/right_friction
    friction_velocities:
      - 740.0
      - 740.0
    friction_soft_start_stop_time: 1.0

heat_controller:
  ros__parameters:
    heat_per_shot: 1
    reserved_heat: 0

bullet_feeder_controller:
  ros__parameters:
    bullets_per_feeder_turn: 8.0
    shot_frequency: 20.0
    safe_shot_frequency: 10.0
    eject_frequency: 10.0
    eject_time: 0.05
    deep_eject_frequency: 5.0
    deep_eject_time: 0.2
    single_shot_max_stop_delay: 2.0

left_friction_velocity_pid_controller:
  ros__parameters:
    measurement: /gimbal/left_friction/velocity
    setpoint: /gimbal/left_friction/control_velocity
    control: /gimbal/left_friction/control_torque
    kp: 0.003436926
    ki: 0.00
    kd: 0.009373434

right_friction_velocity_pid_controller:
  ros__parameters:
    measurement: /gimbal/right_friction/velocity
    setpoint: /gimbal/right_friction/control_velocity
    control: /gimbal/right_friction/control_torque
    kp: 0.003436926
    ki: 0.00
    kd: 0.009373434

bullet_feeder_velocity_pid_controller:
  ros__parameters:
    measurement: /gimbal/bullet_feeder/velocity
    setpoint: /gimbal/bullet_feeder/control_velocity
    control: /gimbal/bullet_feeder/control_torque
    kp: 0.583
    ki: 0.0
    kd: 0.0
