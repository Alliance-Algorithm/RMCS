rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
    - rmcs_core::hardware::DartFillingTestHardware -> catapult_dart
    - rmcs_core::controller::dart::DartFillingTest -> launch_controller
    # - rmcs_core::controller::dart::Test -> actual_speed_and_control_torque_test_node

catapult_dart:
  ros__parameters:
    usb_pid: -1

launch_controller:
  ros__parameters:
    lifting_up_angle_left:      0x0656
    lifting_down_angle_left:    0x0DE3
    lifting_up_angle_right:     0x08C7
    lifting_down_angle_right:   0x0C54
    trigger_free_angle:   0x0E2A
    trigger_lock_angle:   0x0FC1
    limiting_wait_time:   0x0010
    limiting_free_angle_: 0x0001
    limiting_lock_angle_: 0x0050


