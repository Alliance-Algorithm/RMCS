rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::CatapultDartV3Full -> catapult_dart
      - rmcs_core::controller::dart::DartFillingTest -> launch_controller

catapult_dart:
  ros__parameters:
    serial_filter: ""
    first_sample_spot: 1.0
    final_sample_spot: 4.0

launch_controller:
  ros__parameters:
    # Trigger servo: PWM value 0.0–1.0
    # PWMServo range: 0.5ms–2.5ms in a 20ms period
    # 0.0 → 0.5ms (full CCW), 0.5 → 1.5ms (center), 1.0 → 2.5ms (full CW)
    trigger_free_value: 0.75     # tune to match physical free position
    trigger_lock_value: 0.63     # tune to match physical lock position

    # Motor torque limits (N·m)
    max_torque:      1.0
    max_belt_torque: 5.0
