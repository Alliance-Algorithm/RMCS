rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::DeformableInfantryV2 -> deformable_infantry

      - rmcs_core::referee::Status -> referee_status
      - rmcs_core::referee::Command -> referee_command

      - rmcs_core::referee::command::Interaction -> referee_interaction
      - rmcs_core::referee::command::interaction::Ui -> referee_ui
      - rmcs_core::referee::app::ui::Infantry -> referee_ui_infantry

      - rmcs_core::controller::chassis::DeformableChassis -> chassis_controller
      - rmcs_core::controller::chassis::ChassisPowerController -> chassis_power_controller
      - rmcs_core::controller::chassis::DeformableChassisController -> deformable_chassis_controller

      - rmcs_core::broadcaster::ValueBroadcaster -> value_broadcaster

value_broadcaster:
  ros__parameters:
    forward_list:
      - /chassis/left_front_joint/control_torque
      - /chassis/left_back_joint/control_torque
      - /chassis/right_front_joint/control_torque
      - /chassis/right_back_joint/control_torque
      - /chassis/left_front_joint/velocity
      - /chassis/left_front_joint/control_angle_error
deformable_infantry:
  ros__parameters:
    serial_filter_rmcs_board: ""
    left_front_zero_point: 0
    left_back_zero_point: 0
    right_back_zero_point: 0
    right_front_zero_point: 0

# NOTE: V2 uses LK motor built-in encoder zero point for joints.
# Joint motor: MG5010 i36, zero at 62.5deg, range 62.5deg -> 8deg (360deg system)
chassis_controller:
  ros__parameters:
    min_angle: 8.0
    max_angle: 62.5

    # Outer loop: angle PID (angle_error -> velocity_ref)
    joint_angle_kp: 2.0
    joint_angle_ki: 0.0
    joint_angle_kd: 0.0

    # Inner loop: velocity PID (velocity_error -> torque)
    joint_velocity_kp: 1.0
    joint_velocity_ki: 0.0
    joint_velocity_kd: 0.0

    joint_velocity_limit: 500.0
    joint_torque_limit: 10.0

deformable_chassis_controller:
  ros__parameters:
    mess: 12.5
    moment_of_inertia: 1.0
    chassis_radius: 0.2341741
    rod_length: 0.150
    wheel_radius: 0.055
    friction_coefficient: 0.6
    k1: 2.958580e+00
    k2: 3.082190e-03
    no_load_power: 11.37
