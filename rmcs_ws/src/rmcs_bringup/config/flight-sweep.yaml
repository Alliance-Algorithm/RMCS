rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::Flight -> flight_hardware
      - rmcs_core::controller::gimbal::SineSweepController -> sine_sweep
      - rmcs_core::broadcaster::ValueBroadcaster -> value_broadcaster

value_broadcaster:
  ros__parameters:
    forward_list:
      - /gimbal/yaw/velocity
      - /gimbal/yaw/velocity_imu
      - /gimbal/yaw/torque
      - /gimbal/yaw/control_torque

      - /gimbal/pitch/velocity
      - /gimbal/pitch/velocity_imu
      - /gimbal/pitch/torque
      - /gimbal/pitch/control_torque

flight_hardware:
  ros__parameters:
    board_serial: "d4-9d44"
    yaw_motor_zero_point: 55555
    pitch_motor_zero_point: 18578
    yaw_bias_fast_ki: 0.5
    yaw_bias_slow_ki: 0.02
    yaw_bias_fast_duration: 3.0

sine_sweep:
  ros__parameters:
    # ============================================================
    # Mode switch (THE ONLY TOGGLE NEEDED)
    #   "prbs" → pitch axis (PRBS excitation, avoids mechanical limits)
    #   "sine" → yaw  axis (traditional log-sine sweep)
    # Axis is auto-derived from mode.
    # ============================================================
    mode: sine

    # ---- Shared ----
    amplitude: 0.3

    # ---- Sine mode (used when mode=sine → yaw) ----
    sine_output_path: /tmp/sweep_yaw.csv
    f_start: 1.0
    f_end: 50.0
    repeat_time: 20

    # ---- PRBS mode (used when mode=prbs → pitch) ----
    prbs_output_path: /tmp/prbs_pitch.csv
    prbs_register_length: 12
    prbs_bit_period: 9
    prbs_num_repeats: 8

    # ---- Pitch safety & homing (used when mode=prbs) ----
    pitch_angle_limit: 0.5236  # ±30°, exceeding aborts sweep → homing
    homing_angle_threshold: 0.02
    homing_velocity_threshold: 0.05
    homing_kp: 1.5
    homing_kd: 0.3
    homing_torque_limit: 1.5
