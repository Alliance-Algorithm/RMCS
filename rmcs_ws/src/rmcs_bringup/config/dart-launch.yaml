rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::CatapultDartV3Full -> dart_hardware
      - rmcs_core::controller::dart::DartLaunchControllerV2 -> launch_controller
      - rmcs_core::controller::dart::DartSettings -> dart_settings
      - rmcs_core::controller::pid::PidController -> force_screw_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> yaw_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> pitch_velocity_pid_controller

dart_hardware:
  ros__parameters:
    serial_filter: ""
    first_sample_spot: 1.0
    final_sample_spot: 4.0

launch_controller:
  ros__parameters:
    belt_velocity: 15.0
    sync_coefficient: 0.5
    max_control_torque: 15.0
    b_kp: 1.0
    b_ki: 0.0
    b_kd: 0.0
    # Trigger servo PWM value 0.0–1.0 (from dart-filling-test calibration)
    trigger_free_value: 0.75
    trigger_lock_value: 0.63

dart_settings:
  ros__parameters:
    # 0 = manual joystick, 1 = auto PID
    is_auto_pitch_control_mode: 0
    is_auto_force_control_mode: 0
    max_transform_rate: 5.0
    pitch_angle_kp: 0.0
    pitch_angle_ki: 0.0
    pitch_angle_kd: 0.0
    force_control_kp: 0.001
    force_control_ki: 0.0
    force_control_kd: 0.0

force_screw_velocity_pid_controller:
  ros__parameters:
    measurement: /dart/force_screw_motor/velocity
    setpoint: /force/control/velocity
    control: /dart/force_screw_motor/control_torque
    kp: 1.0
    ki: 0.0
    kd: 0.0

yaw_velocity_pid_controller:
  ros__parameters:
    measurement: /dart/yaw_motor/velocity
    setpoint: /yaw/control/velocity
    control: /dart/yaw_motor/control_torque
    kp: 1.0
    ki: 0.0
    kd: 0.0

pitch_velocity_pid_controller:
  ros__parameters:
    measurement: /dart/pitch_motor/velocity
    setpoint: /pitch/control/velocity
    control: /dart/pitch_motor/control_torque
    kp: 1.0
    ki: 0.0
    kd: 0.0
