rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::Arm -> arm_hardware
      - rmcs_core::controller::arm::ArmConfig -> arm_config
      - rmcs_core::controller::arm::ArmSolver -> arm_solver
      - rmcs_core::controller::pid::PidController -> big_yaw_velocity_pid_controller

      
arm_hardware:
  ros__parameters:
    arm_board_usb_pid: 0x488d
    gripper_zero_point: 15504
    joint6_zero_point: 19344
    joint5_zero_point: 47964
    joint4_zero_point: 4017
    joint3_zero_point: 51845
    joint2_zero_point: 54221
    joint1_zero_point: 28268
    big_yaw_zero_point: 40607

arm_solver:
  ros__parameters:
    controller_list: [gravity,friction]

big_yaw_velocity_pid_controller:
  ros__parameters:
    measurement: /chassis/big_yaw/velocity
    setpoint: 0.0
    control: /chassis/big_yaw/control_torque
    kp: 1.5
    ki: 0.0
    kd: 0.0
    output_min: -3.0
    output_max: 3.0
    
