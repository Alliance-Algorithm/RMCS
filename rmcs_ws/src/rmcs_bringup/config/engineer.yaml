rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::Arm-> arm_hardware
      - rmcs_core::controller::arm::ArmConfig -> arm_config
      - rmcs_core::controller::arm::ArmSolver -> arm_solver
      - rmcs_core::controller::arm::ArmController -> arm_controller
      - rmcs_core::controller::arm::SubArmController -> sub_arm_controller
arm_hardware:
  ros__parameters:
    main_arm_board_usb_pid: 0x1783
    sub_arm_board_usb_pid: 0x488d
    main_joint6_zero_point: 0
    main_joint5_zero_point: 4196
    main_joint4_zero_point: 731
    main_joint3_zero_point: 9211
    main_joint2_zero_point: 61315
    main_joint1_zero_point: 32883

    sub_joint6_zero_point: 22700
    sub_joint5_zero_point: 4020
    sub_joint4_zero_point: 4030
    sub_joint3_zero_point: 51845
    sub_joint2_zero_point: 54221
    sub_joint1_zero_point: 28268

arm_solver:
  ros__parameters:
    controller_list: [gravity,friction]

sub_arm_controller:
  ros__parameters:
    controller_list: [friction,gravity]

