rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::Engineer -> engineer_hardware
      - rmcs_core::controller::arm::ArmConfig -> arm_config
      - rmcs_core::controller::arm::ArmController -> arm_controller
      - rmcs_core::controller::arm::ArmSolver -> arm_solver

      - rmcs_core::referee::ImageTransmissionLink -> image_transmission

      - rmcs_core::controller::pid::ErrorPidController -> gripper_error_angle_pid_controller
      - rmcs_core::controller::pid::PidController -> gripper_velocity_pid_controller
      - rmcs_core::controller::pid::ErrorPidController -> image_pitch_angle_pid_controller
      - rmcs_core::controller::pid::PidController -> image_pitch_velocity_pid_controller

      - rmcs_core::controller::leg::LegController -> leg_controller

      - rmcs_core::controller::chassis::ChassisController -> chassis_controller
      - rmcs_core::controller::chassis::SteeringWheelController -> steering_wheel_controller
            
      - rmcs_core::controller::pid::PidController -> leg_omni_l_velocity_controller
      - rmcs_core::controller::pid::PidController -> leg_omni_r_velocity_controller

      - rmcs_core::controller::pid::ErrorPidController -> big_yaw_angle_error_pid_controller
      - rmcs_core::controller::pid::PidController -> big_yaw_velocity_pid_controller

      - rmcs_core::controller::pid::ErrorPidController -> leg_lf_angle_error_pid_controller
      - rmcs_core::controller::pid::PidController -> leg_lf_velocity_pid_controller
      - rmcs_core::controller::pid::ErrorPidController -> leg_rf_angle_error_pid_controller
      - rmcs_core::controller::pid::PidController -> leg_rf_velocity_pid_controller

      - rmcs_core::controller::pid::ErrorPidController -> leg_lb_angle_error_pid_controller
      - rmcs_core::controller::pid::PidController -> leg_lb_velocity_pid_controller
      - rmcs_core::controller::pid::ErrorPidController -> leg_rb_angle_error_pid_controller
      - rmcs_core::controller::pid::PidController -> leg_rb_velocity_pid_controller

    
      - rmcs_core::broadcaster::ValueBroadcaster -> value_broadcaster
engineer_hardware:
  ros__parameters:
    arm_board_usb_pid: 0x1783
    left_board_usb_pid: 0x652f
    right_board_usb_pid: 0x75f3
    gripper_zero_point: 6264
    image_pitch_zero_point: 47534
    joint6_zero_point: 0
    joint5_zero_point: 37436
    joint4_zero_point: 28029
    joint3_zero_point: 28134
    joint2_zero_point: 61315 
    joint1_zero_point: 11371
    steering_lf_zero_point: 3399
    steering_lb_zero_point: 681
    steering_rb_zero_point: 693
    steering_rf_zero_point: 5435
    leg_lf_ecd_zero_point: 109021
    leg_lb_ecd_zero_point: 153207
    leg_rb_ecd_zero_point: 2135
    leg_rf_ecd_zero_point: 133400
    big_yaw_zero_point: 30133

image_transmission:
  ros__parameters:
    path: /dev/ttyUSB0    

arm_controller:
  ros__parameters:
    image_pitch_target_theta: 0.0
    image_pitch_qmin: 2.2
    image_pitch_qmax: -0.7

arm_solver:
  ros__parameters:
    controller_list: [pid, gravity,friction]

leg_controller:
  ros__parameters:
    forward_x_position_in_FourWheel: 243.0
    forward_x_position_in_SixWheel: 250.0
    backward_x_position_in_SixWheel: 221.0
    initial_parameter: [1.700270, 1.680, 1.680, 1.700270, 0.0, 2000.0]
    press_parameter: [0.799803, 0.778351, 0.778351, 0.799803, -600.0, 400.0]
    lift_parameter: [0.902222, 1.413787, 1.413787, 0.902222, -600.0, 800.0]
    lift_and_initial_parameter: [1.400270, 1.410, 1.410, 1.400270, -100.0, 1800.0]
    initial_again_parameter: [1.500270, 1.480, 1.480, 1.500270, -300.0, 600.0]
    press_again_parameter: [0.799803, 0.778351, 0.778351, 0.799803, -600.0, 400.0]
    lift_again_parameter: [0.902222, 1.413787, 1.413787, 0.902222, -600.0, 800.0]

gripper_error_angle_pid_controller:
  ros__parameters:
    measurement: /arm/gripper/target_theta_error
    control: /arm/gripper/control_vel
    kp: 100.0
    ki: 0.0
    kd: 0.0

gripper_velocity_pid_controller:
  ros__parameters:
    measurement: /arm/gripper/motor/velocity
    setpoint: /arm/gripper/control_vel
    control: /arm/gripper/motor/control_torque
    kp: 0.1
    ki: 0.0
    kd: 0.0

image_pitch_angle_pid_controller:
  ros__parameters:
    measurement: /arm/image_pitch/target_theta_error
    control: /arm/image_pitch/control_vel
    kp: 200.0
    ki: 0.0
    kd: 0.0

image_pitch_velocity_pid_controller:
  ros__parameters:
    measurement: /arm/image_pitch/motor/velocity
    setpoint: /arm/image_pitch/control_vel
    control: /arm/image_pitch/motor/control_torque
    kp: 0.1
    ki: 0.0
    kd: 0.0

leg_omni_l_velocity_controller:
  ros__parameters:
    measurement: /leg/omni/l/velocity
    setpoint: /leg/omni/l/target_vel
    control: /leg/omni/l/control_torque
    kp: 0.7
    ki: 0.0
    kd: 0.0

leg_omni_r_velocity_controller:
  ros__parameters:
    measurement: /leg/omni/r/velocity
    setpoint: /leg/omni/r/target_vel
    control: /leg/omni/r/control_torque
    kp: 0.7
    ki: 0.0
    kd: 0.0

big_yaw_angle_error_pid_controller:
  ros__parameters:
    measurement: /chassis/big_yaw/target_angle_error
    control: /chassis/big_yaw/control_vel
    kp: 31.3
    ki: 0.0
    kd: 2.6
big_yaw_velocity_pid_controller:
  ros__parameters:
    measurement: /chassis/big_yaw/velocity
    setpoint: /chassis/big_yaw/control_vel
    control: /chassis/big_yaw/control_torque
    kp: 3.99
    ki: 0.0
    kd: 0.039


leg_lf_angle_error_pid_controller:
  ros__parameters:
    measurement: /leg/joint/lf/control_theta_error
    control: /leg/joint/lf/control_vel
    kp: 150.0
    ki: 0.0
    kd: 5.0
leg_lf_velocity_pid_controller:
  ros__parameters:
    measurement: /leg/joint/lf/velocity
    setpoint: /leg/joint/lf/control_vel
    control: /leg/joint/lf/control_torque
