rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::Engineer -> engineer_hardware
      # - rmcs_core::controller::arm::ArmConfig -> arm_config
      # - rmcs_core::controller::arm::ArmController -> arm_controller
      # - rmcs_core::controller::arm::ArmSolver -> arm_solver

      # - rmcs_core::referee::ImageTransmissionLink -> image_transmission

      # - rmcs_core::controller::pid::PidController -> gripper_angle_pid_controller
      # - rmcs_core::controller::pid::PidController -> gripper_velocity_pid_controller
      # - rmcs_core::controller::pid::PidController -> image_pitch_angle_pid_controller
      # - rmcs_core::controller::pid::PidController -> image_pitch_velocity_pid_controller

      # - rmcs_core::controller::leg::LegController -> leg_controller

      - rmcs_core::controller::chassis::ChassisController -> chassis_controller
      - rmcs_core::controller::chassis::SteeringWheelController -> steering_wheel_controller
      # - rmcs_core::controller::chassis::EngineerChassisClimberController -> engineer_chassis_climber_controller
            
      # - rmcs_core::controller::pid::PidController -> leg_omni_l_velocity_controller
      # - rmcs_core::controller::pid::PidController -> leg_omni_r_velocity_controller

      # - rmcs_core::controller::pid::ErrorPidController -> big_yaw_angle_error_pid_controller
      # - rmcs_core::controller::pid::PidController -> big_yaw_velocity_pid_controller

      # - rmcs_core::controller::pid::ErrorPidController -> leg_lb_angle_error_pid_controller
      # - rmcs_core::controller::pid::PidController -> leg_lb_velocity_pid_controller
      # - rmcs_core::controller::pid::ErrorPidController -> leg_rb_angle_error_pid_controller
      # - rmcs_core::controller::pid::PidController -> leg_rb_velocity_pid_controller

    
      # - rmcs_core::broadcaster::ValueBroadcaster -> value_broadcaster
engineer_hardware:
  ros__parameters:
    board_serial_arm_board: "AF-4728-8B65-756E-F0CF-DBDD-D3C8-C843-2DF6"
    board_serial_little_board: "D4-632C-37BC-6A17-ACA2-E3FE-91E9"
    gripper_zero_point: 26298
    image_pitch_zero_point: 43131
    joint6_zero_point: 12566
    joint5_zero_point: 37436
    joint4_zero_point: 33865
    joint3_zero_point: 28459
    joint2_zero_point: 31222 
    joint1_zero_point: 14865
    steering_lf_zero_point: 1343
    steering_lb_zero_point: 4096
    steering_rb_zero_point: 0
    steering_rf_zero_point: 4096
    leg_lf_ecd_zero_point: 220679
    leg_lb_ecd_zero_point: 153149
    leg_rb_ecd_zero_point: 220758
    leg_rf_ecd_zero_point: 119271
    big_yaw_zero_point: 32705

image_transmission:
  ros__parameters:
    path: /dev/ttyUSB0    

arm_controller:
  ros__parameters:
    image_pitch_qmin: -0.7
    image_pitch_qmax: 2.2
    initial_delay_time: 1000

arm_solver:
  ros__parameters:
    controller_list: [pid, gravity, friction]

leg_controller:
  ros__parameters:
    forward_x_position_in_FourWheel: 238.0
    forward_x_position_in_SixWheel: 250.0
    backward_x_position_in_SixWheel: 221.0
    tof_b: 0.51
    up_one_stairs:
      params:
        initial: [1.600270, 1.550, 0.0, 2000.0]
        press: [0.972736, 0.493103, -600.0, 250.0]
        wait : [0.972736,0.493103, 0.0, 300.0]
        lift: [1.016670, 1.150821, -600.0, 50.0]
    up_two_stairs:
      params:
        initial: [1.600270, 1.550, 0.0, 2000.0]
        press: [0.972736, 0.493103, -600.0, 250.0]
        wait : [0.972736,0.493103, 0.0, 300.0]
        lift: [1.016670, 1.150821, -400.0, 30.0]
        # lift_and_initial: [1.400270, 1.410, -100.0, 1000.0]
        initial_again: [1.600270, 1.550, -300.0, 300.0]
        press_again: [0.802736, 0.693103, -500.0, 300.0]
        lift_again: [0.956670, 1.350821, -200.0, 50.0]



gripper_angle_pid_controller:
  ros__parameters:
    measurement: /arm/gripper/motor/angle
    setpoint: /arm/gripper/target_theta
    control: /arm/gripper/control_vel
    kp: 230.0
    ki: 0.0
    kd: 0.0

gripper_velocity_pid_controller:
  ros__parameters:
    measurement: /arm/gripper/motor/velocity
    setpoint: /arm/gripper/control_vel
    control: /arm/gripper/motor/control_torque
    kp: 0.8
    ki: 0.0
    kd: 0.02


image_pitch_angle_pid_controller:
  ros__parameters:
    measurement: /arm/image_pitch/motor/angle
    setpoint: /arm/image_pitch/target_theta
    control: /arm/image_pitch/control_vel
    kp: 200.0
    ki: 0.0
    kd: 0.0

image_pitch_velocity_pid_controller:
  ros__parameters:
    measurement: /arm/image_pitch/motor/velocity
    setpoint: /arm/image_pitch/control_vel
    control: /arm/image_pitch/motor/control_torque
    kp: 0.1
    ki: 0.0
    kd: 0.0

leg_omni_l_velocity_controller:
  ros__parameters:
    measurement: /leg/omni/l/velocity
    setpoint: /leg/omni/l/target_vel
    control: /leg/omni/l/control_torque
    kp: 0.7
    ki: 0.0
    kd: 0.0

leg_omni_r_velocity_controller:
  ros__parameters:
    measurement: /leg/omni/r/velocity
    setpoint: /leg/omni/r/target_vel
    control: /leg/omni/r/control_torque
    kp: 0.7
    ki: 0.0
    kd: 0.0

big_yaw_angle_error_pid_controller:
  ros__parameters:
    measurement: /chassis/big_yaw/target_angle_error
    control: /chassis/big_yaw/control_vel
    kp: 61.3
    ki: 0.0
    kd: 2.6
big_yaw_velocity_pid_controller:
  ros__parameters:
    measurement: /chassis/big_yaw/velocity
    setpoint: /chassis/big_yaw/control_vel
    control: /chassis/big_yaw/control_torque
    kp: 3.99
    ki: 0.0
    kd: 0.039

leg_lb_angle_error_pid_controller:
  ros__parameters:
    measurement: /leg/joint/lb/control_theta_error
    control: /leg/joint/lb/control_vel
    kp: 6000.0
    ki: 0.0
    kd: 0.0
leg_lb_velocity_pid_controller:
  ros__parameters:
    measurement: /leg/joint/lb/velocity
    setpoint: /leg/joint/lb/control_vel
    control: /leg/joint/lb/control_torque
    kp: 0.08
    ki: 0.0
    kd: 0.0
    output_max: 40.0

leg_rb_angle_error_pid_controller:
  ros__parameters:
    measurement: /leg/joint/rb/control_theta_error
    control: /leg/joint/rb/control_vel
    kp: 6000.0
    ki: 0.0
    kd: 0.0

leg_rb_velocity_pid_controller:
  ros__parameters:
    measurement: /leg/joint/rb/velocity
    setpoint: /leg/joint/rb/control_vel
    control: /leg/joint/rb/control_torque
    kp: 0.08
    ki: 0.0
    kd: 0.0
    output_max: 40.0

steering_wheel_controller:
  ros__parameters:
    mess: 35.0
    moment_of_inertia: 2.0
    vehicle_radius: 0.3238
    wheel_radius: 0.055
    friction_coefficient: 0.7
    k1: 2.958580e+00
    k2: 3.082190e-03
    no_load_power: 15.37

engineer_chassis_climber_controller:
  ros__parameters:
    front_climber_velocity: 20.0
    back_climber_velocity: 30.0
    auto_climb_support_retract_velocity: 220.0
    auto_climb_approach_chassis_velocity: 2.0
    auto_climb_support_deploy_chassis_velocity: 0.3
    auto_climb_dash_chassis_velocity: 3.0
    auto_climb_leveled_pitch_threshold: 0.09
    sync_coefficient: 0.2
    first_stair_approach_pitch: 0.517
    second_stair_approach_pitch: 0.365    
    front_kp: 1.0
    front_ki: 0.0
    front_kd: 0.5
    back_kp: 0.5
    back_ki: 0.0
    back_kd: 0.0

value_broadcaster:
  ros__parameters:
    forward_list:
      - "/leg/joint/rf/velocity"
      - "/leg/joint/lf/velocity"
      - "/leg/joint/lf/torque"
      - "/leg/joint/lf/control_torque"
      - "/leg/joint/rf/torque"
      - "/leg/joint/rf/control_torque"
      - "/leg/encoder/rf/angle"
      - "/leg/encoder/lb/angle"
      - "/arm/gripper/motor/velocity"
      - "/arm/gripper/motor/torque"
      - "/arm/gripper/target_theta"
      - "/arm/gripper/motor/control_torque"
      - "/arm/gripper/motor/angle"
      - "pitch_imu_angle"
      - "/leg/pitch_imu_angle_offsetted"

    
