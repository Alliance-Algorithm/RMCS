    k1: 2.958580e+00
    k2: 3.082190e-03
    no_load_power: 15.37


value_broadcaster:
  ros__parameters:
    forward_list:
      - "/leg/encoder/lf/angle"
      - "/leg/encoder/lb/angle"
      - "/leg/encoder/rb/angle"
      - "/leg/encoder/rf/angle"
      - "/arm/joint_6/theta"
      - "/arm/joint_6/velocity"
      - "/arm/joint_2/theta"
      - "/arm/joint_2/velocity"
    
