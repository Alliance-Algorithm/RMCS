rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::Engineer -> engineer_hardware
      - rmcs_core::controller::arm::ArmConfig -> arm_config
      - rmcs_core::controller::arm::ArmController -> arm_controller
      - rmcs_core::controller::arm::ArmSolver -> arm_solver

      - rmcs_core::referee::ImageTransmissionLink -> image_transmission

      - rmcs_core::controller::pid::ErrorPidController -> gripper_error_angle_pid_controller
      - rmcs_core::controller::pid::PidController -> gripper_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> image_pitch_angle_pid_controller
      - rmcs_core::controller::pid::PidController -> image_pitch_velocity_pid_controller

      - rmcs_core::controller::leg::LegController -> leg_controller

      - rmcs_core::controller::chassis::ChassisController -> chassis_controller
      - rmcs_core::controller::chassis::SteeringWheelController -> steering_wheel_controller
            
      - rmcs_core::controller::pid::PidController -> leg_omni_l_velocity_controller
      - rmcs_core::controller::pid::PidController -> leg_omni_r_velocity_controller

      - rmcs_core::controller::pid::ErrorPidController -> big_yaw_angle_error_pid_controller
      - rmcs_core::controller::pid::PidController -> big_yaw_velocity_pid_controller

      - rmcs_core::controller::pid::ErrorPidController -> leg_lf_angle_error_pid_controller
      - rmcs_core::controller::pid::PidController -> leg_lf_velocity_pid_controller
      - rmcs_core::controller::pid::ErrorPidController -> leg_rf_angle_error_pid_controller
      - rmcs_core::controller::pid::PidController -> leg_rf_velocity_pid_controller

      - rmcs_core::controller::pid::ErrorPidController -> leg_lb_angle_error_pid_controller
      - rmcs_core::controller::pid::PidController -> leg_lb_velocity_pid_controller
      - rmcs_core::controller::pid::ErrorPidController -> leg_rb_angle_error_pid_controller
      - rmcs_core::controller::pid::PidController -> leg_rb_velocity_pid_controller

    
      - rmcs_core::broadcaster::ValueBroadcaster -> value_broadcaster
engineer_hardware:
  ros__parameters:
    board_serial_arm_board: ""
    board_serial_left_board: "D4-18B8-2958-0D33-4168-27CE-86B2"
    board_serial_right_board: "D4-D354-B7C8-A457-ECB1-11A9-998E"
    gripper_zero_point: 26298
    image_pitch_zero_point: 47534
    joint6_zero_point: 61801
    joint5_zero_point: 37436
    joint4_zero_point: 31748
    joint3_zero_point: 28134
    joint2_zero_point: 61315 
    joint1_zero_point: 11371
    steering_lf_zero_point: 1343
    steering_lb_zero_point: 4096
    steering_rb_zero_point: 0
    steering_rf_zero_point: 4096
    leg_lf_ecd_zero_point: 223679
    leg_lb_ecd_zero_point: 153149
    leg_rb_ecd_zero_point: 222758
    leg_rf_ecd_zero_point: 123271
    big_yaw_zero_point: 30133

image_transmission:
  ros__parameters:
    path: /dev/ttyUSB0    

arm_controller:
  ros__parameters:
    auto_walk_joint_target: [0.0, 1.23, -1.36, 0.0, 0.63, 0.0]
    auto_storage_lb:
      params:
        step1_pose:
          target_pose: [0.35, -0.12, 0.42, 0.0, 1.20, 0.0]
          velocity_scaling: 0.05
          acceleration_scaling: 0.05
        step2_pose:
          target_pose: [0.38, -0.10, 0.36, 0.0, 1.35, 0.10]
          velocity_scaling: 0.04
          acceleration_scaling: 0.04
        step3_lin:
          target_pose: [0.42, -0.08, 0.30, 0.0, 1.45, 0.10]
          velocity_scaling: 0.03
          acceleration_scaling: 0.03
        step4_lin:
          target_pose: [0.46, -0.05, 0.26, 0.0, 1.50, 0.12]
          velocity_scaling: 0.02
          acceleration_scaling: 0.02
        step5_pose:
          target_pose: [0.40, -0.02, 0.34, 0.0, 1.25, 0.05]
          velocity_scaling: 0.03
          acceleration_scaling: 0.03
    image_pitch_qmin: -0.7
    image_pitch_qmax: 2.2

arm_solver:
  ros__parameters:
    controller_list: [pid, gravity,friction]

leg_controller:
  ros__parameters:
    forward_x_position_in_FourWheel: 242.0
    forward_x_position_in_SixWheel: 250.0
    backward_x_position_in_SixWheel: 221.0
    tof_k: 0.08
    tof_b: 0.35
    v_ref: 2.0
    up_one_stairs:
      params:
        initial: [1.600270, 1.550, 0.0, 2000.0]
        press: [0.734945, 0.733315, -600.0, 400.0]
        lift: [1.002222, 1.453787, -600.0, 400.0]
        lift_and_initial: [1.400270, 1.410, -100.0, 1300.0]
        initial_again: [1.700270, 1.680, -300.0, 600.0]
        press_again: [0.734945, 0.733315, -600.0, 400.0]
        lift_again: [1.002222, 1.453787, -600.0, 500.0]
    up_two_stairs:
      params:
        initial: [1.600270, 1.550, 0.0, 2000.0]
        press: [0.734945, 0.733315, -600.0, 400.0]
        lift: [0.902222, 1.453787, -600.0, 400.0]
        lift_and_initial: [1.400270, 1.410, -100.0, 1300.0]
        initial_again: [1.700270, 1.680, -300.0, 600.0]
        press_again: [0.734945, 0.733315, -600.0, 400.0]
        lift_again: [0.902222, 1.453787, -600.0, 500.0]


gripper_error_angle_pid_controller:
  ros__parameters:
    measurement: /arm/gripper/target_theta_error
    control: /arm/gripper/control_vel
    kp: 100.0
    ki: 0.0
    kd: 0.0

gripper_velocity_pid_controller:
  ros__parameters:
    measurement: /arm/gripper/motor/velocity
    setpoint: /arm/gripper/control_vel
    control: /arm/gripper/motor/control_torque
    kp: 0.1
    ki: 0.0
    kd: 0.0

