    ki: 0.0
    kd: 0.2

leg_rf_angle_error_pid_controller:
  ros__parameters:
    measurement: /leg/joint/rf/control_theta_error
    control: /leg/joint/rf/control_vel
    kp: 150.0
    ki: 0.0
    kd: 5.0


leg_rf_velocity_pid_controller:
  ros__parameters:
    measurement: /leg/joint/rf/velocity
    setpoint: /leg/joint/rf/control_vel
    control: /leg/joint/rf/control_torque
    kp: 2.0
    ki: 0.0
    kd: 0.2

leg_lb_angle_error_pid_controller:
  ros__parameters:
    measurement: /leg/joint/lb/control_theta_error
    control: /leg/joint/lb/control_vel
    kp: 6000.0
    ki: 0.0
    kd: 0.0
leg_lb_velocity_pid_controller:
  ros__parameters:
    measurement: /leg/joint/lb/velocity
    setpoint: /leg/joint/lb/control_vel
    control: /leg/joint/lb/control_torque
