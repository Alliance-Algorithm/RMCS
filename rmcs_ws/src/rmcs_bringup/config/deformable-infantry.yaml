rmcs_executor:
  ros__parameters:
    update_rate: 1000.0
    components:
      - rmcs_core::hardware::DeformableInfantry -> deformable_infantry

      - rmcs_core::referee::Status -> referee_status
      - rmcs_core::referee::Command -> referee_command

      - rmcs_core::referee::command::Interaction -> referee_interaction
      - rmcs_core::referee::command::interaction::Ui -> referee_ui
      - rmcs_core::referee::app::ui::Infantry -> referee_ui_infantry

      - rmcs_core::controller::smc::SlidingModeController -> smc_controller0
      - rmcs_core::controller::smc::SlidingModeController -> smc_controller1
      - rmcs_core::controller::smc::SlidingModeController -> smc_controller2
      - rmcs_core::controller::smc::SlidingModeController -> smc_controller3

      - rmcs_core::controller::smc::SmcObserver -> smc_observer0
      - rmcs_core::controller::smc::SmcObserver -> smc_observer1
      - rmcs_core::controller::smc::SmcObserver -> smc_observer2
      - rmcs_core::controller::smc::SmcObserver -> smc_observer3

      - sp_vision_25::bridge::SpVisionBridge -> sp_vision_bridge
      - rmcs_core::controller::gimbal::DeformableInfantryGimbalController -> gimbal_controller

      - rmcs_core::controller::shooting::FrictionWheelController -> friction_wheel_controller
      - rmcs_core::controller::shooting::HeatController -> heat_controller
      - rmcs_core::controller::shooting::BulletFeederController17mm -> bullet_feeder_controller
      - rmcs_core::controller::pid::PidController -> left_friction_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> right_friction_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> bullet_feeder_velocity_pid_controller

      - rmcs_core::controller::chassis::DeformableChassis -> chassis_controller
      # - rmcs_core::controller::chassis::ChassisTestController -> chassis_test_controller
      - rmcs_core::controller::chassis::ChassisPowerController -> chassis_power_controller
      - rmcs_core::controller::chassis::DeformableChassisController -> deformable_chassis_controller

      - rmcs_core::broadcaster::ValueBroadcaster -> value_broadcaster

sp_vision_bridge:
  ros__parameters:
    config_file: configs/standard4.yaml
    debug: false

value_broadcaster:
  ros__parameters:
    forward_list:
      - /smc/smc_controller0/damping_term
      - /smc/smc_controller0/feedforward_term
      - /smc/smc_controller0/c_velocity_error_term
      - /smc/smc_controller0/tanh_term
      - /smc/smc_controller0/k_sliding_term
      - /smc/smc_controller0/sliding_surface_term
      - /smc/smc_controller0/raw_control_torque
      - /smc/smc_controller0/sliding_surface_value
      - /chassis/left_front_joint/control_torque
      - /chassis/left_back_joint/expect_velocity
      - /chassis/left_front_joint/velocity
      - /chassis/left_front_joint/control_angle_error
deformable_infantry:
  ros__parameters:
    serial_filter_rmcs_board: "AF-056F-2E3E-0C9E-EFAD-C0D0-15F0-2483-17D9"
    serial_filter_top_board: "D4-621A-DEE6-D79F-9303-E3D1-C4BC"
    left_front_zero_point: 3748
    left_back_zero_point: 2337
    right_back_zero_point: 5154
    right_front_zero_point: 1718
    yaw_motor_zero_point:  41176
    pitch_motor_zero_point: 15838

chassis_controller:
  ros__parameters:
    min_angle: 12.5
    max_angle: 42.0
    left_front_joint_offset: 257.501488
    left_back_joint_offset: 353.545434
    right_back_joint_offset: 7.591669
    right_front_joint_offset: 273.986725
    Rod_relative_horizontal_coordinate: 5.0
    Rod_relative_longitudinal_coordinate: 75.0
    Rod_length: 80.0

gimbal_controller:
  ros__parameters:
    bullet_speed_fallback: 28.0
    result_timeout: 0.2

    upper_limit: -0.3839724354 # -22 deg
    lower_limit: 0.1 # 6 deg

    yaw_offset: 3.3
    pitch_offset: -1.7
    decision_speed: 7.0
    high_speed_delay_time: 0.0
    low_speed_delay_time: 0.0
    fire_thresh: 0.0025
    max_yaw_acc: 500.0
    max_pitch_acc: 100.0

    manual_joystick_sensitivity: 0.006
    manual_mouse_sensitivity: 0.5

    yaw_angle_kp: 14.2
    yaw_angle_ki: 0.0
    yaw_angle_kd: 0.0

    yaw_velocity_kp: 6.4
    yaw_velocity_ki: 0.0
    yaw_velocity_kd: 0.0

    yaw_vel_ff_gain: 0.47
    yaw_acc_ff_gain: 0.00
    yaw_chassis_spin_torque_ff_gain: 0.0

    # Deformable pitch remains velocity-controlled in the hardware layer, so only the angle loop
    # and planner velocity feedforward are used here until a dedicated pitch sweep is available.
    pitch_angle_kp: 8.0
    pitch_angle_ki: 0.0
    pitch_angle_kd: 0.0
    pitch_vel_ff_gain: 1.0

friction_wheel_controller:
  ros__parameters:
    friction_wheels:
      - /gimbal/left_friction
      - /gimbal/right_friction
    friction_velocities:
      - 700.0
      - 700.0
    friction_soft_start_stop_time: 1.0

heat_controller:
  ros__parameters:
    heat_per_shot: 10000
    reserved_heat: 0

bullet_feeder_controller:
  ros__parameters:
    bullets_per_feeder_turn: 8.0
    shot_frequency: 10.0
    safe_shot_frequency: 10.0
    eject_frequency: 10.0
    eject_time: 0.05
    deep_eject_frequency: 5.0
    deep_eject_time: 0.2
    single_shot_max_stop_delay: 2.0

shooting_recorder:
  ros__parameters:
    friction_wheel_count: 2
    log_mode: 1 # 1: trigger, 2: timing

left_friction_velocity_pid_controller:
  ros__parameters:
    measurement: /gimbal/left_friction/velocity
    setpoint: /gimbal/left_friction/control_velocity
    control: /gimbal/left_friction/control_torque
    
    kp: 0.003436926
    ki: 0.00
    kd: 0.009373434

right_friction_velocity_pid_controller:
  ros__parameters:
    measurement: /gimbal/right_friction/velocity
    setpoint: /gimbal/right_friction/control_velocity
    control: /gimbal/right_friction/control_torque
    kp: 0.003436926
    ki: 0.00
    kd: 0.009373434

bullet_feeder_velocity_pid_controller:
  ros__parameters:
    measurement: /gimbal/bullet_feeder/velocity
    setpoint: /gimbal/bullet_feeder/control_velocity
    control: /gimbal/bullet_feeder/control_torque
    kp: 1.3
    ki: 0.0
    kd: 0.0

smc_controller0:
  ros__parameters:
    c: 0.025
    epsilon: 0.2
    k: 0.15
    phi: 0.2
    J: 1.8
    B: 0.0004
    dead_zero_min: -0.8
    dead_zero_max: 0.8
    angle_error_deadzone: 1.1
    angle_error: /chassis/left_front_joint/control_angle_error
    current_velocity: /chassis/left_front_joint/velocity
    target_velocity: /chassis/left_front_joint/expect_velocity
    control_torque: /chassis/left_front_joint/control_torque

smc_controller1:
  ros__parameters:
    c: 0.025
    epsilon: 0.2
    k: 0.15
    phi: 0.2
    J: 1.8
    B: 0.0004
    dead_zero_min: -0.8
    dead_zero_max: 0.8
    angle_error_deadzone: 1.1
    angle_error: /chassis/left_back_joint/control_angle_error
    current_velocity: /chassis/left_back_joint/velocity
    target_velocity: /chassis/left_back_joint/expect_velocity
    control_torque: /chassis/left_back_joint/control_torque

smc_controller2:
  ros__parameters:
    c: 0.025
    epsilon: 0.2
    k: 0.15
    phi: 0.2
    J: 1.8
    B: 0.0004
    dead_zero_min: -0.8
    dead_zero_max: 0.8
    angle_error_deadzone: 1.1
    angle_error: /chassis/right_back_joint/control_angle_error
    current_velocity: /chassis/right_back_joint/velocity
    target_velocity: /chassis/right_back_joint/expect_velocity
    control_torque: /chassis/right_back_joint/control_torque

smc_controller3:
  ros__parameters:
    c: 0.025
    epsilon: 0.2
    k: 0.15
    phi: 0.2
    J: 1.8
    B: 0.0004
    dead_zero_min: -0.8
    dead_zero_max: 0.8
    angle_error_deadzone: 1.1
    angle_error: /chassis/right_front_joint/control_angle_error
    current_velocity: /chassis/right_front_joint/velocity
    target_velocity: /chassis/right_front_joint/expect_velocity
    control_torque: /chassis/right_front_joint/control_torque

smc_observer0:
  ros__parameters:
    velocity_limit: 1.0
    control_error: /chassis/left_front_joint/control_angle_error
    velocity: /chassis/left_front_joint/velocity
    yaw_expect_velocity_: /chassis/left_front_joint/expect_velocity

smc_observer1:
  ros__parameters:
    velocity_limit: 1.0
    control_error: /chassis/left_back_joint/control_angle_error
    velocity: /chassis/left_back_joint/velocity
    yaw_expect_velocity_: /chassis/left_back_joint/expect_velocity

smc_observer2:
  ros__parameters:
    velocity_limit: 1.0
    control_error: /chassis/right_back_joint/control_angle_error
    velocity: /chassis/right_back_joint/velocity
    yaw_expect_velocity_: /chassis/right_back_joint/expect_velocity

smc_observer3:
  ros__parameters:
    velocity_limit: 1.0
    control_error: /chassis/right_front_joint/control_angle_error
    velocity: /chassis/right_front_joint/velocity
    yaw_expect_velocity_: /chassis/right_front_joint/expect_velocity

deformable_chassis_controller:
  ros__parameters:
    mess: 22.5
    moment_of_inertia: 1.0
    chassis_radius: 0.2364198
    rod_length: 0.150
    wheel_radius: 0.055
    friction_coefficient: 0.6
    k1: 2.958580e+00
    k2: 3.082190e-03
    no_load_power: 11.37
