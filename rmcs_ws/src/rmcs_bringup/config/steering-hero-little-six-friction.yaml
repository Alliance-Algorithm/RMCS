      - rmcs_core::controller::shooting::PutterController -> bullet_feeder_controller
      - rmcs_core::controller::pid::PidController -> first_back_friction_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> first_front_friction_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> second_back_friction_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> second_front_friction_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> third_back_friction_velocity_pid_controller
      - rmcs_core::controller::pid::PidController -> third_front_friction_velocity_pid_controller
      - rmcs_core::controller::shooting::ShootingRecorder -> shooting_recorder

      - rmcs_core::controller::chassis::SteeringWheelStatus -> steering_wheel_status
      - rmcs_core::controller::chassis::HeroChassisController -> chassis_controller
      - rmcs_core::controller::chassis::HeroChassisPowerController -> chassis_power_controller
      - rmcs_core::controller::chassis::HeroSteeringWheelController -> steering_wheel_controller
      - rmcs_core::controller::chassis::ChassisClimberController -> climber_controller

      # - rmcs_auto_aim::AutoAimInitializer -> auto_aim_initializer
      # - rmcs_auto_aim::AutoAimController -> auto_aim_controller

      # - rmcs_core::broadcaster::ValueBroadcaster -> value_broadcaster
